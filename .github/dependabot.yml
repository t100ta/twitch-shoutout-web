version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"

    labels:
      - "dependencies"

    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"

    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"

      dev-dependencies:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
